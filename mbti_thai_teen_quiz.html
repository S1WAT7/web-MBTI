<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI Quiz — รู้จักตัวเองกันเถอะ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f0eff4;
  --text-muted: #7a7a8a;
  --text-dim: #4a4a58;
  --accent: #c8f564;
  --accent-dim: rgba(200,245,100,0.12);
  --accent-glow: rgba(200,245,100,0.25);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --coral: #ff7b6b;
  --coral-dim: rgba(255,123,107,0.12);
  --teal: #5eead4;
  --teal-dim: rgba(94,234,212,0.12);
  --amber: #fbbf24;
  --E: #c8f564; --I: #a78bfa;
  --S: #5eead4; --N: #ff7b6b;
  --T: #60a5fa; --F: #f472b6;
  --J: #fbbf24; --P: #34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body {
  font-family: 'Noto Sans Thai', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* BG grid */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(200,245,100,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,245,100,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events:none;
  z-index:0;
}

.wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
  position: relative;
  z-index:1;
}

/* HEADER */
.site-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 3rem;
  padding-top: 1rem;
}
.logo-mark {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(200,245,100,0.2);
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 2px;
}
.site-header-sub {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
}

/* HERO */
.hero {
  margin-bottom: 3rem;
}
.hero-tag {
  display: inline-block;
  font-size: 11px;
  font-family:'Space Mono', monospace;
  color: var(--text-muted);
  letter-spacing:1px;
  margin-bottom: 1rem;
}
.hero h1 {
  font-size: clamp(28px, 6vw, 44px);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 1rem;
  color: var(--text);
}
.hero h1 span {
  color: var(--accent);
}
.hero p {
  font-size: 15px;
  color: var(--text-muted);
  max-width: 480px;
  line-height: 1.8;
  margin-bottom: 1.5rem;
}
.hero-meta {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.hero-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
}
.hero-meta-item span {
  color: var(--accent);
  font-weight: 700;
}

.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--accent);
  color: #0d0d0f;
  border: none;
  border-radius: 8px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Noto Sans Thai', sans-serif;
  cursor: pointer;
  transition: all .2s;
  margin-top: 1.5rem;
}
.start-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px var(--accent-glow);
}
.start-btn svg { transition: transform .2s; }
.start-btn:hover svg { transform: translateX(4px); }

/* PROGRESS */
.progress-section {
  margin-bottom: 2rem;
}
.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.progress-label {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
}
.progress-count {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--accent);
}
.progress-track {
  width: 100%;
  height: 3px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 3px;
  background: var(--accent);
  border-radius: 99px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* DIM INDICATORS */
.dim-pills {
  display: flex;
  gap: 6px;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.dim-pill {
  font-size: 11px;
  font-family:'Space Mono',monospace;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid transparent;
  color: var(--text-dim);
  background: var(--surface);
  transition: all .3s;
}
.dim-pill.active-EI { border-color: var(--E); color: var(--E); background: rgba(200,245,100,0.08); }
.dim-pill.active-SN { border-color: var(--S); color: var(--S); background: rgba(94,234,212,0.08); }
.dim-pill.active-TF { border-color: var(--T); color: var(--T); background: rgba(96,165,250,0.08); }
.dim-pill.active-JP { border-color: var(--J); color: var(--J); background: rgba(251,191,36,0.08); }

/* QUESTION CARD */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  animation: cardIn .35s cubic-bezier(.4,0,.2,1);
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}
.q-number {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 10px;
  letter-spacing: 1px;
}
.q-scene {
  font-size: 13px;
  color: var(--text-muted);
  background: var(--surface2);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 14px;
  border-left: 3px solid var(--border-hover);
  line-height: 1.7;
}
.q-text {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.55;
  margin-bottom: 1.5rem;
}

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  text-align: left;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Noto Sans Thai', sans-serif;
  color: var(--text-muted);
  line-height: 1.6;
  transition: all .18s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  width: 100%;
}
.opt-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
  background: #222228;
}
.opt-letter {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  min-width: 20px;
  margin-top: 2px;
  color: var(--text-dim);
  transition: color .18s;
}
.opt-btn:hover .opt-letter { color: var(--text-muted); }

.opt-btn.sel-A {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--text);
}
.opt-btn.sel-A .opt-letter { color: var(--accent); }
.opt-btn.sel-B {
  border-color: var(--purple);
  background: var(--purple-dim);
  color: var(--text);
}
.opt-btn.sel-B .opt-letter { color: var(--purple); }

/* NAVIGATION */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-top: 1rem;
}
.nav-ghost {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 18px;
  color: var(--text-muted);
  font-size: 13px;
  font-family: 'Noto Sans Thai', sans-serif;
  cursor: pointer;
  transition: all .18s;
}
.nav-ghost:hover:not(:disabled) {
  border-color: var(--border-hover);
  color: var(--text);
}
.nav-ghost:disabled { opacity:.28; cursor:not-allowed; }
.nav-next {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 10px 22px;
  color: #0d0d0f;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Sans Thai', sans-serif;
  cursor: pointer;
  transition: all .18s;
}
.nav-next:hover:not(:disabled) {
  box-shadow: 0 4px 20px var(--accent-glow);
  transform: translateY(-1px);
}
.nav-next:disabled { opacity:.28; cursor:not-allowed; transform:none; box-shadow:none; }

/* ADAPTIVE MESSAGE */
.adaptive-msg {
  background: var(--surface2);
  border: 1px solid rgba(200,245,100,0.15);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 1.5rem;
  display: none;
  animation: cardIn .3s ease;
}
.adaptive-msg.show { display: block; }

/* RESULT */
.result-screen { animation: cardIn .5s ease; }
.result-hero {
  text-align: center;
  padding: 3rem 0 2rem;
}
.result-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 1rem;
}
.type-display {
  font-family: 'Space Mono', monospace;
  font-size: clamp(52px, 12vw, 80px);
  font-weight: 700;
  letter-spacing: 8px;
  line-height: 1;
  margin-bottom: 1rem;
  background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.type-name {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}
.type-desc {
  font-size: 14px;
  color: var(--text-muted);
  max-width: 440px;
  margin: 0 auto 1.5rem;
  line-height: 1.8;
}
.trait-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 2.5rem;
}
.tag {
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 99px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
}

/* DIM BREAKDOWN */
.breakdown {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.breakdown-title {
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--text-dim);
  letter-spacing: 1px;
  margin-bottom: 1.25rem;
}
.dim-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1rem;
}
.dim-row:last-child { margin-bottom: 0; }
.dim-ends {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  min-width: 32px;
}
.dim-letter {
  font-family:'Space Mono',monospace;
  font-size:12px;
  font-weight:700;
  min-width:20px;
  text-align:center;
}
.dim-track {
  flex:1;
  height:6px;
  background:var(--surface2);
  border-radius:99px;
  overflow:hidden;
  position:relative;
}
.dim-bar {
  height:6px;
  border-radius:99px;
  transition: width .8s cubic-bezier(.4,0,.2,1);
}
.dim-pct {
  font-size:11px;
  font-family:'Space Mono',monospace;
  color:var(--text-dim);
  min-width:32px;
  text-align:right;
}

/* MEANING CARD */
.meaning-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.meaning-card h3 {
  font-size: 12px;
  font-family:'Space Mono',monospace;
  color: var(--text-dim);
  letter-spacing:1px;
  margin-bottom:1rem;
}
.meaning-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.meaning-row:last-child { border-bottom: none; padding-bottom:0; }
.meaning-letter {
  font-family:'Space Mono',monospace;
  font-size:14px;
  font-weight:700;
  min-width:22px;
}
.meaning-text {
  font-size:13px;
  color:var(--text-muted);
  line-height:1.7;
}
.meaning-text strong {
  color:var(--text);
  font-weight:600;
}

/* STRENGTHS GRID */
.strengths-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:1.5rem;
}
.strength-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
}
.strength-card h4 {
  font-size:11px;
  font-family:'Space Mono',monospace;
  color:var(--text-dim);
  letter-spacing:1px;
  margin-bottom:10px;
}
.strength-list {
  list-style:none;
  font-size:13px;
  color:var(--text-muted);
  line-height:2;
}
.strength-list li::before {
  content:'→ ';
  color:var(--accent);
  font-family:'Space Mono',monospace;
  font-size:10px;
}

.restart-btn {
  display:block;
  width:100%;
  background:transparent;
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
  color:var(--text-muted);
  font-size:14px;
  font-family:'Noto Sans Thai',sans-serif;
  cursor:pointer;
  transition:all .2s;
  text-align:center;
  margin-top:.5rem;
}
.restart-btn:hover {
  border-color:var(--border-hover);
  color:var(--text);
}

/* CONFIDENCE INDICATOR */
.confidence-bar {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:1.5rem;
  padding:12px 16px;
  background:var(--surface2);
  border-radius:10px;
  border:1px solid var(--border);
}
.confidence-label {
  font-size:12px;
  font-family:'Space Mono',monospace;
  color:var(--text-dim);
  white-space:nowrap;
}
.conf-dots {
  display:flex;
  gap:4px;
  flex:1;
}
.conf-dot {
  height:4px;
  flex:1;
  border-radius:99px;
  background:var(--surface);
  transition:background .3s;
}
.conf-dot.filled { background: var(--accent); }
.confidence-val {
  font-size:12px;
  font-family:'Space Mono',monospace;
  color:var(--accent);
  white-space:nowrap;
}

@media(max-width:480px){
  .strengths-grid{grid-template-columns:1fr}
  .type-display{font-size:52px;letter-spacing:4px}
  .q-card{padding:1.25rem}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="site-header">
    <div class="logo-mark">MBTI</div>
    <div class="site-header-sub">personality test — thai edition</div>
  </div>

  <!-- HERO SCREEN -->
  <div id="hero-screen">
    <div class="hero">
      <div class="hero-tag">// รู้จักตัวเองกันดีกว่า</div>
      <h1>แบบทดสอบ MBTI<br><span>สไตล์วัยรุ่นไทย</span></h1>
      <p>20–30 คำถาม เลือกแค่ A หรือ B ไม่มีตัวเลือกกลาง เพราะชีวิตจริงมันบังคับให้เลือกอยู่ดี ระบบจะถามเพิ่มถ้าผลยังไม่ชัด</p>
      <div class="hero-meta">
        <div class="hero-meta-item">⏱ <span>~5</span> นาที</div>
        <div class="hero-meta-item">📊 <span>4</span> มิติบุคลิกภาพ</div>
        <div class="hero-meta-item">🎯 <span>16</span> ประเภท</div>
      </div>
      <button class="start-btn" onclick="startQuiz()">
        เริ่มเลย
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="#0d0d0f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" style="display:none">
    <div class="progress-section">
      <div class="progress-row">
        <div class="progress-label">PROGRESS</div>
        <div class="progress-count" id="q-count">1 / 20</div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:5%"></div></div>
    </div>
    <div class="dim-pills">
      <div class="dim-pill" id="pill-EI">E/I</div>
      <div class="dim-pill" id="pill-SN">S/N</div>
      <div class="dim-pill" id="pill-TF">T/F</div>
      <div class="dim-pill" id="pill-JP">J/P</div>
    </div>
    <div class="adaptive-msg" id="adaptive-msg"></div>
    <div id="q-container"></div>
    <div class="nav-row">
      <button class="nav-ghost" id="prev-btn" onclick="prevQ()">← ก่อนหน้า</button>
      <button class="nav-next" id="next-btn" onclick="nextQ()" disabled>ถัดไป →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" style="display:none"></div>
</div>

<script>
// ====================================================
// QUESTION BANK — 30 questions covering EI/SN/TF/JP
// ====================================================
const ALL_Q = [
  // EI — 10 questions
  {id:1, dim:"EI", scene:"เพิ่งสอบเสร็จ กลุ่มเพื่อนชวนไปฉลองที่ห้าง", q:"ตอนนั้นรู้สึกยังไง?", a:"โอ้โห ไปเลย อยู่กับเพื่อนสนุกกว่าอยู่บ้านแน่", aT:"E", b:"โล่งใจแต่อยากกลับบ้านก่อน เดี๋ยวค่อยชาร์จพลัง", bT:"I"},
  {id:2, dim:"EI", scene:"วันหยุดยาว 3 วัน ไม่มีแผน", q:"คุณอยากทำอะไรที่สุด?", a:"ชวนเพื่อนออกไปข้างนอก คาเฟ่ สวน งานอีเวนต์ ไปเลย", aT:"E", b:"อยู่บ้าน ดูซีรีส์ เล่นเกม หรืออ่านหนังสือ", bT:"I"},
  {id:3, dim:"EI", scene:"เพื่อนใหม่เข้ามาในห้อง ยังไม่รู้จักใคร", q:"คุณทำอะไร?", a:"เดินไปทักก่อนเลย แนะนำตัวและถามชื่อ", aT:"E", b:"รอให้เขาทักก่อนหรือรอโอกาสตามธรรมชาติ", bT:"I"},
  {id:4, dim:"EI", scene:"มีปัญหากับเพื่อน รู้สึกอึดอัด", q:"คุณจัดการยังไง?", a:"หาคนฟัง เพราะพูดออกไปแล้วคิดได้ดีขึ้น", aT:"E", b:"นั่งคิดคนเดียวก่อนจนเคลียร์ในหัวได้", bT:"I"},

// ====================================================
// QUIZ ENGINE — adaptive follow-up if tie
// ====================================================
const THRESHOLD = 0.70; // 70% confidence needed
const BASE_PER_DIM = 5;
const MAX_PER_DIM = 10;

let answers = {}; // questionId -> 'A'|'B'
let usedIds = new Set();
let queue = [];   // current question queue (ids)
let currentIdx = 0;
let extraRound = false;

function buildInitialQueue() {
  const dims = ["EI","SN","TF","JP"];
  const q = [];
  dims.forEach(d => {
    const pool = ALL_Q.filter(x => x.dim === d);
    shuffle(pool).slice(0, BASE_PER_DIM).forEach(x => { q.push(x.id); usedIds.add(x.id); });
  });
  shuffle(q);
  return q;
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function getScore() {
  const score = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  queue.slice(0, currentIdx+1).forEach(id => {
    const ans = answers[id];
    if(!ans) return;
    const q = ALL_Q.find(x=>x.id===id);
    score[ans==="A"?q.aT:q.bT]++;
  });
  return score;
}

function getConfidence(score) {
  const pairs = [["E","I"],["S","N"],["T","F"],["J","P"]];
  return pairs.map(([a,b]) => {
    const total = score[a]+score[b];
    if(total===0) return 0;
    return Math.max(score[a],score[b])/total;
  });
}

function checkNeedExtra() {
  if(extraRound) return []; // already added extras
  const score = getScore();
  const conf = getConfidence(score);
  const dimNames = ["EI","SN","TF","JP"];
  const weak = [];
  conf.forEach((c,i) => { if(c < THRESHOLD) weak.push(dimNames[i]); });
  return weak;
}

function addExtraQuestions(weakDims) {
  let added = 0;
  weakDims.forEach(dim => {
    const pool = ALL_Q.filter(x => x.dim===dim && !usedIds.has(x.id));
    const extra = shuffle(pool).slice(0, Math.min(5, pool.length));
    extra.forEach(x => { queue.push(x.id); usedIds.add(x.id); added++; });
  });
  extraRound = true;
  return added;
}

function startQuiz() {
  queue = buildInitialQueue();
  currentIdx = 0;
  document.getElementById("hero-screen").style.display = "none";
  document.getElementById("quiz-screen").style.display = "block";
  renderQ();
}

function renderQ() {
  const total = queue.length;
  const id = queue[currentIdx];
  const q = ALL_Q.find(x=>x.id===id);

  document.getElementById("q-count").textContent = `${currentIdx+1} / ${total}`;
  document.getElementById("progress-fill").style.width = ((currentIdx+1)/total*100)+"%";

  // dim pill highlight
  ["EI","SN","TF","JP"].forEach(d => {
    const el = document.getElementById("pill-"+d);
    el.className = "dim-pill" + (q.dim===d?" active-"+d:"");
  });

  const selA = answers[id]==="A";
  const selB = answers[id]==="B";
  document.getElementById("q-container").innerHTML = `
    <div class="q-card">
      <div class="q-number">ข้อ ${currentIdx+1} — มิติ ${q.dim}</div>
      ${q.scene?`<div class="q-scene">${q.scene}</div>`:""}
      <div class="q-text">${q.q}</div>
      <div class="options">
        <button class="opt-btn${selA?" sel-A":""}" onclick="selectAns('A')">
          <span class="opt-letter">A</span><span>${q.a}</span>
        </button>
        <button class="opt-btn${selB?" sel-B":""}" onclick="selectAns('B')">
          <span class="opt-letter">B</span><span>${q.b}</span>
        </button>
      </div>
    </div>`;

  document.getElementById("prev-btn").disabled = currentIdx===0;
  document.getElementById("next-btn").disabled = !answers[id];

  // adaptive message
  const adaptiveEl = document.getElementById("adaptive-msg");
  if(currentIdx===20 && extraRound) {
    adaptiveEl.className = "adaptive-msg show";
    adaptiveEl.textContent = "⚡ บางมิติยังไม่ชัดเพียงพอ เพิ่มคำถามบางส่วนเพื่อผลลัพธ์ที่แม่นยำขึ้น";
  } else {
    adaptiveEl.className = "adaptive-msg";
  }
}

function selectAns(choice) {
  const id = queue[currentIdx];
  answers[id] = choice;
  renderQ();
  if(currentIdx < queue.length-1) {
    setTimeout(()=>nextQ(), 350);
  }
}

function nextQ() {
  if(!answers[queue[currentIdx]]) return;

  // Check if this was last base question
  if(currentIdx === 19 && !extraRound) {
    const weak = checkNeedExtra();
    if(weak.length > 0) {
      addExtraQuestions(weak);
    }
  }

  if(currentIdx < queue.length-1) {
    currentIdx++;
    renderQ();
  } else {
    showResult();
  }
}

function prevQ() {
  if(currentIdx > 0) { currentIdx--; renderQ(); }
}

  INFJ:{name:"ผู้มีวิสัยทัศน์และหัวใจ",desc:"เข้าใจคนได้ลึกมาก มีอุดมการณ์ชัด อยากทำให้โลกดีขึ้น เป็นคนหายากที่ผสม EI และ TF ได้ดี",strengths:["เห็นอกเห็นใจ","มีวิสัยทัศน์","ตั้งใจจริง","ลึกซึ้ง"],growth:["ดูแลตัวเองบ้าง ไม่ใช่แค่คนอื่น","เปิดรับว่าแผนอาจเปลี่ยนได้"],tags:["เห็นอกเห็นใจ","วิสัยทัศน์","ลึกซึ้ง","ตั้งใจ"]},

  ENFJ:{name:"ผู้นำด้านความสัมพันธ์",desc:"เชื่อมคนได้เก่ง ชอบช่วยเหลือ เป็นแรงบันดาลใจให้คนรอบข้าง ดูแลคนอื่นเก่งแต่บางทีลืมดูแลตัวเอง",strengths:["อบอุ่น","เป็นผู้นำ","เห็นอกเห็นใจ","เชื่อมสัมพันธ์"],growth:["ฝึกปฏิเสธบ้าง","อย่ารับทุกปัญหาของคนอื่นมาเป็นของตัวเอง"],tags:["อบอุ่น","ผู้นำ","เห็นอกเห็นใจ","ช่วยเหลือ"]},
  ENFP:{name:"นักสำรวจผู้มีชีวิตชีวา",desc:"พลังงานสูง ไอเดียล้น ชอบลองสิ่งใหม่ เชื่อมต่อกับคนได้ง่าย และมองโลกเต็มไปด้วยความเป็นไปได้",strengths:["กระตือรือร้น","ไอเดียเยอะ","เปิดกว้าง","เชื่อมคนได้ง่าย"],growth:["ทำให้จบก่อนเริ่มสิ่งใหม่","ฝึกโฟกัส"],tags:["พลังงาน","ไอเดีย","เปิดกว้าง","สังคม"]},
  ISTJ:{name:"ผู้พิทักษ์กฎและความรับผิดชอบ",desc:"เชื่อถือได้มาก ทำงานเป็นระเบียบ รับผิดชอบสูง ไม่ค่อยชอบเสี่ยงโดยไม่มีเหตุผล",strengths:["ซื่อสัตย์","มีระเบียบ","รับผิดชอบ","พึ่งพาได้"],growth:["ลองสิ่งใหม่บ้าง","ยืดหยุ่นกับคนที่ทำงานต่างสไตล์"],tags:["ซื่อสัตย์","ระเบียบ","รับผิดชอบ","พึ่งพาได้"]},
  ISFJ:{name:"ผู้ปกป้องผู้อ่อนโยน",desc:"ดูแลคนรอบข้างดีมาก ความทรงจำเรื่องคนแม่น จริงใจและห่วงใย แต่บางทีลืมว่าตัวเองก็ต้องการการดูแลเหมือนกัน",strengths:["ห่วงใย","ซื่อสัตย์","จำรายละเอียดเก่ง","อดทน"],growth:["พูดความต้องการตัวเองให้ชัดขึ้น","ลองปฏิเสธงานที่เกินกำลัง"],tags:["ห่วงใย","ซื่อสัตย์","อดทน","จดจำ"]},
  ESTJ:{name:"ผู้บริหารที่เชื่อถือได้",desc:"ชอบความชัดเจน ตัดสินใจเร็ว รักษากฎและระเบียบ บริหารได้ดี เป็นคนที่พึ่งได้ในวันที่ยากที่สุด",strengths:["เด็ดขาด","มีระเบียบ","บริหารเก่ง","รับผิดชอบ"],growth:["ฟังความคิดเห็นที่ต่างออกไปบ้าง","ยืดหยุ่นได้เมื่อสถานการณ์เปลี่ยน"],tags:["เด็ดขาด","ระเบียบ","บริหาร","รับผิดชอบ"]},
  ESFJ:{name:"ผู้เชื่อมสัมพันธ์",desc:"ชอบดูแลคน รักความเป็นกลุ่ม ใส่ใจความรู้สึกทุกคน ทำให้ทุกคนรู้สึกว่าตัวเองสำคัญ",strengths:["อบอุ่น","รักสังคม","ใส่ใจผู้อื่น","รักษาความสัมพันธ์"],growth:["ตัดสินใจให้ตัวเองบ้าง ไม่ต้องรอความเห็นชอบทุกคน","รับมือกับความขัดแย้งโดยตรงมากขึ้น"],tags:["อบอุ่น","สังคม","ใส่ใจ","สัมพันธ์"]},
  ISTP:{name:"ช่างฝีมือผู้เงียบขรึม",desc:"แก้ปัญหาเก่งมาก ชอบลงมือทำ ไม่ต้องคุยมาก ขอแค่ทำงานได้ผล สังเกตรายละเอียดเก่งแบบที่คนอื่นมองข้าม",strengths:["ปฏิบัติจริง","สังเกตเก่ง","สงบเสงี่ยม","แก้ปัญหาได้"],growth:["แสดงความรู้สึกให้คนสนิทรู้บ้าง","วางแผนระยะยาวมากขึ้น"],tags:["ปฏิบัติ","สังเกต","เงียบขรึม","แก้ปัญหา"]},
  ISFP:{name:"ศิลปินผู้ใจดี",desc:"ดำรงชีวิตในปัจจุบัน ชอบสิ่งสวยงาม ไม่ชอบถูกบังคับ รักอิสระ แต่ข้างในอ่อนไหวและห่วงใยคนรอบข้างมาก",strengths:["อ่อนโยน","ชอบสุนทรียะ","รักอิสระ","ใจดี"],growth:["กล้าแสดงออกมากขึ้น","วางแผนระยะยาวบ้าง"],tags:["อ่อนโยน","ศิลปะ","อิสระ","ใจดี"]},
  ESTP:{name:"นักสำรวจผู้กล้า",desc:"ชอบลุยไปเลย ไม่ชอบนั่งคิดนาน ตื่นตัว ปรับตัวเร็ว และมักเป็นคนที่สนุกที่สุดในห้อง",strengths:["กล้าเสี่ยง","ปรับตัวเร็ว","ลงมือทำ","สนุกสนาน"],growth:["คิดถึงผลระยะยาวบ้าง","ระวังการตัดสินใจไวเกิน"],tags:["กล้าเสี่ยง","ปรับตัว","ลงมือทำ","สนุก"]},
  ESFP:{name:"นักแสดงชีวิตจริง",desc:"ชอบสังคม พลังงานล้น สร้างความสนุกให้ทุกคน ใช้ชีวิตเต็มที่ในทุกวัน และทำให้คนรอบข้างยิ้มได้เสมอ",strengths:["สนุกสนาน","ชอบสังคม","กระตือรือร้น","สร้างบรรยากาศ"],growth:["วางแผนระยะยาวมากขึ้น","ฝึกอยู่กับตัวเองบ้าง"],tags:["สนุก","สังคม","กระตือรือร้น","บรรยากาศ"]},
};

const DIM_COLORS = {E:"#c8f564",I:"#a78bfa",S:"#5eead4",N:"#ff7b6b",T:"#60a5fa",F:"#f472b6",J:"#fbbf24",P:"#34d399"};

function showResult() {
  const score = getScore();
  const type =
    (score.E>=score.I?"E":"I")+
    (score.S>=score.N?"S":"N")+
    (score.T>=score.F?"T":"F")+
    (score.J>=score.P?"J":"P");

  const info = TYPE_INFO[type] || {name:"ไม่พบข้อมูล",desc:"",strengths:[],growth:[],tags:[]};
  const pct = (a,b) => { const t=a+b; if(!t)return 50; return Math.round(a/t*100); };

  const conf = getConfidence(score);
  const avgConf = Math.round(conf.reduce((a,b)=>a+b,0)/4*100);
  const confDots = Array.from({length:10},(_,i)=>`<div class="conf-dot${i<Math.round(avgConf/10)?" filled":""}"></div>`).join("");

  const dims = [["E","I",score.E,score.I],["S","N",score.S,score.N],["T","F",score.T,score.F],["J","P",score.J,score.P]];
  const winLetter = type.split("");

  const meaningText = {
    E:"ชาร์จพลังจากการอยู่กับคน ชอบสังคม สื่อสารด้วยการพูด",
    I:"ชาร์จพลังจากการอยู่คนเดียว ชอบพื้นที่ส่วนตัว คิดก่อนพูด",
    S:"โฟกัสที่ข้อเท็จจริงและปัจจุบัน เชื่อสิ่งที่จับต้องได้",
    N:"โฟกัสที่ภาพรวมและความเป็นไปได้ ชอบสิ่งที่ยังไม่เกิดขึ้น",
    T:"ตัดสินใจด้วยเหตุผลและตรรกะ ให้ความจริงมากกว่าความรู้สึก",
    F:"ตัดสินใจด้วยค่านิยมและความรู้สึก ใส่ใจว่าคนอื่นจะรู้สึกยังไง",
    J:"ชอบวางแผนและความชัดเจน เคลียร์ให้จบก่อนพักสบายใจ",
    P:"ชอบความยืดหยุ่นและโอกาสใหม่ ๆ เปิดรับสิ่งที่ยังไม่รู้"
  };

  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("result-screen").style.display = "block";
  document.getElementById("result-screen").innerHTML = `
    <div class="result-screen">
      <div class="result-hero">
        <div class="result-eyebrow">// ผลลัพธ์ของคุณคือ</div>
        <div class="type-display">${type}</div>
        <div class="type-name">${info.name}</div>
        <div class="type-desc">${info.desc}</div>
        <div class="trait-tags">${info.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      </div>

      <div class="confidence-bar">
        <div class="confidence-label">CONFIDENCE</div>
        <div class="conf-dots">${confDots}</div>
        <div class="confidence-val">${avgConf}%</div>
      </div>

      <div class="breakdown">
        <div class="breakdown-title">สัดส่วนแต่ละมิติ</div>
        ${dims.map(([a,b,av,bv])=>{
          const p = pct(av,bv);
          const winA = av>=bv;
          return `<div class="dim-row">
            <span class="dim-letter" style="color:${DIM_COLORS[a]}">${a}</span>
            <div class="dim-track">
              <div class="dim-bar" style="width:${p}%;background:${DIM_COLORS[winA?a:b]}"></div>
            </div>
            <span class="dim-letter" style="color:${DIM_COLORS[b]}">${b}</span>
            <span class="dim-pct">${winA?p:100-p}% ${winA?a:b}</span>
          </div>`;
        }).join("")}
      </div>

      <div class="meaning-card">
        <h3>ความหมายของ ${type}</h3>
        ${winLetter.map(l=>`
          <div class="meaning-row">
            <span class="meaning-letter" style="color:${DIM_COLORS[l]}">${l}</span>
            <span class="meaning-text"><strong>${l==="E"?"Extroversion":l==="I"?"Introversion":l==="S"?"Sensing":l==="N"?"Intuition":l==="T"?"Thinking":l==="F"?"Feeling":l==="J"?"Judging":"Perceiving"}</strong> — ${meaningText[l]}</span>
          </div>`).join("")}
      </div>

      <div class="strengths-grid">
        <div class="strength-card">
          <h4>จุดแข็ง</h4>
          <ul class="strength-list">${info.strengths.map(s=>`<li>${s}</li>`).join("")}</ul>
        </div>
        <div class="strength-card">
          <h4>พัฒนาต่อได้</h4>
          <ul class="strength-list">${info.growth.map(s=>`<li>${s}</li>`).join("")}</ul>
        </div>
      </div>

      <button class="restart-btn" onclick="restartQuiz()">↺ ทำแบบทดสอบอีกครั้ง</button>
    </div>`;
}

function restartQuiz() {
  answers = {}; usedIds = new Set(); queue = []; currentIdx = 0; extraRound = false;
  document.getElementById("result-screen").style.display = "none";
  document.getElementById("hero-screen").style.display = "block";
  window.scrollTo(0,0);
}
</script>
</body>
</html>
